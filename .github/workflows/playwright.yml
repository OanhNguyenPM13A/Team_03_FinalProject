name: Playwright Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Run tests but do NOT fail CI if tests fail
      # Also generate JUnit report directly from CLI to ensure file exists
      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        run: npx playwright test --reporter=html,line,junit
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      # Upload HTML report
      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-node-${{ matrix.node-version }}
          path: playwright-report/
          retention-days: 30

      # Upload JUnit XML results (Playwright usually outputs junit.xml in root unless configured)
      # We'll upload the whole test-results folder to be safe.
      - name: Upload JUnit Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-junit-node-${{ matrix.node-version }}
          path: |
            test-results/
            junit.xml
          retention-days: 30

      # Publish test results to GitHub UI (skip for fork PRs)
      - name: Publish Playwright Test Results
        uses: dorny/test-reporter@v1
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          name: Playwright Test Results (Node ${{ matrix.node-version }})
          path: |
            test-results/**/*.xml
            junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Show warning if tests failed
        if: steps.playwright.outcome == 'failure'
        run: echo "⚠️ Some Playwright tests failed, but CI is allowed to pass."